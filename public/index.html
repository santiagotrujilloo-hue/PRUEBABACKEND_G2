<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./bonito.css">
    <script type="module" src="./main.js"></script>
    <title>FrontEnd Estatico</title>
</head>
<body>
    <div class="background-decor"></div>
    <header>
        <h1>LoanMaster <span>Calculadora de Préstamos</span></h1>
    </header>
    <main>
        <section class="glass-card">
            <form id="losDatos">
                <div class="form-group">
                    <label for="elNombre">Nombre Completo</label>
                    <input type="text" id="elNombre" value="Lina Rios" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label for="elPrestamo">Monto del Préstamo ($)</label>
                    <input type="number" id="elPrestamo" value="1200000" min="0" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="losMeses">Plazo (Meses)</label>
                        <input type="number" id="losMeses" value="21" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="losIntereses">Interés Anual (%)</label>
                        <input type="number" id="losIntereses" value="21" step="0.1" required>
                    </div>
                </div>
                <button type="submit" id="btnCalcular">Calcular Cuota Mensual</button>
                
                <div id="resultCard" class="result-display hidden">
                    <p class="result-label">Cuota Mensual Estimada</p>
                    <h2 id="valorCuota">$ 0.00</h2>
                    <p id="nombreCliente" class="result-client"></p>
                    <div class="divider"></div>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>
            Creado por el profesor Orlando Arboleda, para el curso de EDyA1 en el Universidad Autónoma de
                Occidente
        </p>
            
    </footer>     
</body>
</html>
